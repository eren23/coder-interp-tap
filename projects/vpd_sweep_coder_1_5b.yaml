name: vpd_sweep_coder_1_5b
description: |
  Multi-layer VPD sweep over Qwen2.5-Coder-1.5B. The train command loops
  over a comma-separated list of layers passed via env var VPD_LAYERS,
  re-running the vpd_lora launcher once per layer (each producing its own
  W&B run + checkpoint artifact).

  Two modes:
    - SKIP_LORA_MERGE=1  → trains VPD on the BASE Coder-1.5B (no LoRA)
    - SKIP_LORA_MERGE=0  → merges lora-style-final before VPD training

  Designed to run as 8 parallel pods (4 base + 4 LoRA), each handling a
  slice of 2 layers from [0, 4, 8, 12, 16, 20, 24, 27]. Combined that's
  8 layers × 2 models = 16 trained VPD checkpoints for the attribution
  graph in the Dria blog post.

repo: "https://github.com/eren23/coder-interp-tap"
branch: main
shallow: true
workspace: "/workspace/project"

pod:
  gpu_type: "NVIDIA RTX A6000"
  gpu_count: 1
  container_disk: 50
  volume_disk: 50
  interruptible: false

python: "3.10"

install_torch: "torch>=2.5,<2.7"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

install:
  - "transformers>=4.50"
  - "accelerate>=0.30"
  - "peft>=0.11"
  - "huggingface_hub"
  - "wandb"
  - "datasets>=2.18,<3.0"

# Loop over the layer list, kicking off the vpd_lora launcher once per layer.
# Each loop iteration spawns its own W&B run (run_name suffixed with the layer).
train: >-
  cd /workspace/project &&
  for LAYER in $(echo "$VPD_LAYERS" | tr ',' ' '); do
    VPD_LAYER=$LAYER
    WANDB_RUN_NAME="${WANDB_RUN_NAME_PREFIX}-L${LAYER}"
    export VPD_LAYER WANDB_RUN_NAME
    python3 -u launchers/vpd_lora/main.py
  done

timeout: 36000

env_forward:
  - HUGGINGFACE_HUB_TOKEN
  - WANDB_API_KEY

env_set:
  PYTHONUNBUFFERED: "1"
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  TOKENIZERS_PARALLELISM: "false"
  WANDB_PROJECT: "coder-interp-pilot"
  WANDB_ENTITY: "eren23"
  HF_HOME: "/workspace/project/.hf"
  TRANSFORMERS_CACHE: "/workspace/project/.hf"
  BASE_MODEL: "Qwen/Qwen2.5-Coder-1.5B"
  LORA_WANDB_RUN: "eren23/coder-interp-pilot/niiz0d0u"
  LORA_ARTIFACT: "lora-style-final"
  VPD_TARGETS: "self_attn.q_proj,self_attn.k_proj,self_attn.v_proj,self_attn.o_proj,mlp.up_proj,mlp.down_proj"
  VPD_NUM_COMPONENTS: "32"
  VPD_GAMMA_HIDDEN: "256"
  VPD_BATCH_SIZE: "2"
  SEQ_LEN: "128"
  VPD_WARMUP_STEPS: "400"
  VPD_TRAIN_STEPS: "1500"
  VPD_LR_MAIN: "5e-5"
  VPD_LR_ADV: "1e-2"
  VPD_N_ADV: "3"
  VPD_BETA_ADV: "0.5"
  VPD_BETA_STOCH: "0.5"
  VPD_BETA_IMP: "2e-4"
  VPD_BETA_FREQ: "1e-4"
  VPD_BETA_DELTA: "1e7"
  VPD_P_INITIAL: "2.0"
  VPD_P_FINAL: "0.4"
  VPD_LEAKY_ALPHA: "0.01"
  DATASET_ID: "eren23/eren-code-style"
  DATASET_SPLIT: "train"
  LOG_INTERVAL: "20"
  CHECKPOINT_INTERVAL: "0"
  # Caller fills these via overrides:
  #   VPD_LAYERS=0,4,8,12  (or similar slice)
  #   SKIP_LORA_MERGE=1    (for the BASE sweep)
  #   WANDB_RUN_NAME_PREFIX=vpd-sweep-base   (or "vpd-sweep-lora")

env_defaults:
  WANDB_RUN_NAME_PREFIX: "vpd-sweep"
  VPD_LAYERS: "13"
  SKIP_LORA_MERGE: "0"

variants:
  base-slice-a:
    SKIP_LORA_MERGE: "1"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-base"
    VPD_LAYERS: "0,4"
  base-slice-b:
    SKIP_LORA_MERGE: "1"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-base"
    VPD_LAYERS: "8,12"
  base-slice-c:
    SKIP_LORA_MERGE: "1"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-base"
    VPD_LAYERS: "16,20"
  base-slice-d:
    SKIP_LORA_MERGE: "1"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-base"
    VPD_LAYERS: "24,27"
  lora-slice-a:
    SKIP_LORA_MERGE: "0"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-lora"
    VPD_LAYERS: "0,4"
  lora-slice-b:
    SKIP_LORA_MERGE: "0"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-lora"
    VPD_LAYERS: "8,12"
  lora-slice-c:
    SKIP_LORA_MERGE: "0"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-lora"
    VPD_LAYERS: "16,20"
  lora-slice-d:
    SKIP_LORA_MERGE: "0"
    WANDB_RUN_NAME_PREFIX: "vpd-sweep-lora"
    VPD_LAYERS: "24,27"
