name: sae_train_qwen2_5_coder_1_5b
description: |
  Train a TopK Sparse Autoencoder on the residual stream of
  Qwen2.5-Coder-1.5B at layer 6. Streams code tokens from CommitPackFT
  through the base model on the fly, captures hidden states at the
  chosen layer, and trains the SAE on those activations with periodic
  W&B logging (reconstruction loss, fraction-variance-explained,
  dead-feature percentage).

  This is the RECOMMENDED next experiment — smallest coder model, fast
  feedback loop, real reusable artifact (the trained SAE checkpoint),
  fits on a 4090 with comfortable headroom.

  Variants:
    - smoke   — 50 steps, ~5 min, validates plumbing only
    - pilot   — 2000 steps, ~30-60 min, useful early-signal SAE
    - full    — 20000 steps, ~6-10h, production checkpoint

  Usage:
    crucible run_project sae_train_qwen2_5_coder_1_5b --variant pilot

repo: "https://github.com/eren23/coder-interp-tap"
branch: main
shallow: true
workspace: "/workspace/project"

pod:
  gpu_type: "NVIDIA GeForce RTX 4090"
  gpu_count: 1
  container_disk: 40
  volume_disk: 40
  interruptible: true

python: "3.10"

install_torch: "torch>=2.5,<2.7"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

install:
  - "transformers>=4.50"
  - "accelerate>=0.30"
  - "huggingface_hub"
  - "wandb"
  - "datasets>=2.18,<3.0"

train: >-
  cd /workspace/project &&
  python3 -u launchers/sae_train/main.py

timeout: 36000

env_forward:
  - HUGGINGFACE_HUB_TOKEN
  - WANDB_API_KEY

env_set:
  PYTHONUNBUFFERED: "1"
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  TOKENIZERS_PARALLELISM: "false"
  WANDB_PROJECT: "coder-interp-pilot"
  WANDB_ENTITY: "eren23"
  HF_HOME: "/workspace/project/.hf"
  TRANSFORMERS_CACHE: "/workspace/project/.hf"
  BASE_MODEL: "Qwen/Qwen2.5-Coder-1.5B"
  SAE_LAYER: "6"
  D_MODEL: "1536"
  D_SAE: "24576"           # 16x expansion
  TOPK: "50"
  SAE_LR: "3e-4"
  SAE_AUX_LOSS_COEF: "0.0625"
  SAE_BATCH_SIZE: "4096"
  CAPTURE_BATCH_SIZE: "8"
  SEQ_LEN: "512"
  DATASET_ID: "bigcode/commitpackft"
  DATASET_SUBSET: "python"
  LOG_INTERVAL: "20"
  EVAL_INTERVAL: "200"
  CHECKPOINT_INTERVAL: "1000"

env_defaults:
  WANDB_RUN_NAME: "sae-coder1.5b-L6"

variants:
  smoke:
    SAE_TRAIN_STEPS: "50"
    LOG_INTERVAL: "10"
    EVAL_INTERVAL: "25"
    CHECKPOINT_INTERVAL: "0"
    timeout: 1200
  pilot:
    SAE_TRAIN_STEPS: "2000"
    LOG_INTERVAL: "20"
    EVAL_INTERVAL: "200"
    CHECKPOINT_INTERVAL: "1000"
    timeout: 7200
  full:
    SAE_TRAIN_STEPS: "20000"
    LOG_INTERVAL: "50"
    EVAL_INTERVAL: "500"
    CHECKPOINT_INTERVAL: "2500"
    timeout: 36000
  overnight:
    SAE_TRAIN_STEPS: "100000"
    LOG_INTERVAL: "100"
    EVAL_INTERVAL: "1000"
    CHECKPOINT_INTERVAL: "5000"
    timeout: 36000
