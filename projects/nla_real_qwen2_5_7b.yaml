name: nla_real_qwen2_5_7b
description: |
  Real NLA verbalization pilot. Loads Qwen2.5-7B-Instruct as the base
  model and the kitft NLA Activation Verbalizer (AV) at layer 20, then
  produces actual natural-language descriptions of activation vectors
  via direct transformers `generate(inputs_embeds=...)` with manual
  embedding-injection per the NLA protocol (kitft repo:
  https://github.com/kitft/natural_language_autoencoders).

  Pipeline (no sglang dependency):
    1. capture L20 hidden states from Qwen2.5-7B over a small prompt set
    2. free base; load AV; load AV's nla_meta.yaml from HF for injection params
    3. for each activation: build chat-templated prompt with the ㈎ injection
       char, tokenize, replace embedding at the marker position with the
       L2-normalized activation rescaled to injection_scale (150.0), then
       call model.generate(inputs_embeds=...) and decode
    4. log W&B Table of (idx, prompt, position, token, av_description)

  Variants:
    - smoke   — 3 prompts × 1 vector each, ~$0.30 + ~10 min on 4090 spot
    - pilot   — 20 prompts × 3 token positions, ~$0.50 + ~25 min

  Usage:
    crucible run_project nla_real_qwen2_5_7b --variant smoke
    crucible run_project nla_real_qwen2_5_7b --variant pilot

repo: "https://github.com/eren23/coder-interp-tap"
branch: main
shallow: true
workspace: "/workspace/project"

pod:
  # Sequential model loading (capture-then-AV) on a single 4090.
  # Disk: Qwen2.5-7B (14GB) + AV (14GB) + system. 60GB volume is comfortable.
  gpu_type: "NVIDIA GeForce RTX 4090"
  gpu_count: 1
  container_disk: 50
  volume_disk: 60
  interruptible: true

python: "3.10"

install_torch: "torch>=2.5,<2.7"
install_flags: "--index-url https://download.pytorch.org/whl/cu124"

install:
  - "transformers>=4.50"
  - "accelerate>=0.30"
  - "huggingface_hub"
  - "wandb"
  - "pyarrow>=15.0"
  - "safetensors"
  - "pyyaml"

train: >-
  cd /workspace/project &&
  python3 -u launchers/nla_real/${NLA_VARIANT:-smoke}.py

timeout: 3600

env_forward:
  - HUGGINGFACE_HUB_TOKEN
  - WANDB_API_KEY

env_set:
  PYTHONUNBUFFERED: "1"
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  TOKENIZERS_PARALLELISM: "false"
  WANDB_PROJECT: "coder-interp-pilot"
  WANDB_ENTITY: "eren23"
  HF_HOME: "/workspace/project/.hf"
  TRANSFORMERS_CACHE: "/workspace/project/.hf"
  BASE_MODEL: "Qwen/Qwen2.5-7B-Instruct"
  AV_REPO: "kitft/nla-qwen2.5-7b-L20-av"
  NLA_LAYER: "20"
  MAX_NEW_TOKENS: "120"
  TEMPERATURE: "0.5"

env_defaults:
  NLA_VARIANT: "smoke"
  WANDB_RUN_NAME: "nla-real-qwen2.5-7b-${NLA_VARIANT}"

variants:
  smoke:
    NUM_PROMPTS: "3"
    POSITIONS_PER_PROMPT: "1"
    timeout: 1800
  pilot:
    NUM_PROMPTS: "20"
    POSITIONS_PER_PROMPT: "3"
    timeout: 3600
