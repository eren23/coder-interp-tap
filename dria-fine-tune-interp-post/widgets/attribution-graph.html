<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Widget 5 — Multi-layer Attribution Graph</title>
<style>
  :root {
    --ink: #0E0E10;
    --muted: #6B6B72;
    --hair: #ECECEE;
    --paper: #FFFFFF;
    --bg: #FAFAF8;
    --pill-bg: #F2F2EF;
    --green: #2F8B5E;
    --green-fill: rgba(47, 139, 94, 0.16);
    --tag-border: #E5E5E5;
    --pos: #C8413E;
    --pos-soft: rgba(200, 65, 62, 0.55);
    --neg: #1E5FBE;
    --neg-soft: rgba(30, 95, 190, 0.55);
    --row-line: #EFEFEC;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    margin: 0;
    padding: 56px 24px 96px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
    line-height: 1.55;
  }
  .frame {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--hair);
    border-radius: 14px;
    padding: 22px 28px 30px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--hair);
    margin-bottom: 16px;
  }
  .toolbar h2 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0 14px 0 0;
  }
  .dropdown {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 11px 5px 13px;
    border: 1px solid var(--tag-border);
    border-radius: 6px;
    background: var(--paper);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
  }
  .dropdown::after {
    content: "";
    display: inline-block;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 4px solid var(--muted);
    margin-left: 2px;
  }
  .dropdown select {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font: inherit;
  }
  .pill-toggle {
    display: inline-flex;
    border: 1px solid var(--tag-border);
    border-radius: 6px;
    overflow: hidden;
  }
  .pill-toggle button {
    background: var(--paper);
    border: none;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
  }
  .pill-toggle button.on {
    background: var(--ink);
    color: var(--paper);
  }
  .pill-toggle button + button { border-left: 1px solid var(--tag-border); }
  .pill-toggle button.on + button,
  .pill-toggle button + button.on { border-left-color: var(--ink); }

  .prediction-row {
    display: flex;
    gap: 18px;
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 16px;
    padding: 10px 12px;
    background: var(--pill-bg);
    border-radius: 8px;
  }
  .prediction-row .label {
    font-weight: 600;
    color: var(--ink);
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
  }
  .prediction-row .tok {
    font-family: 'JetBrains Mono', 'Menlo', monospace;
    font-weight: 600;
    color: var(--ink);
  }
  .prediction-row .prob { color: var(--muted); font-size: 11.5px; }

  .graph-wrap {
    position: relative;
    overflow-x: auto;
  }
  svg.graph {
    display: block;
    width: 100%;
    height: auto;
    font-family: 'JetBrains Mono', 'Menlo', monospace;
  }
  .row-label {
    fill: var(--muted);
    font-size: 10px;
    letter-spacing: 0.02em;
  }
  .layer-label {
    fill: var(--ink);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .row-divider {
    stroke: var(--row-line);
    stroke-width: 1;
    fill: none;
  }
  .layer-divider {
    stroke: var(--hair);
    stroke-width: 1;
    fill: none;
  }
  .token-label {
    fill: var(--ink);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .target-label {
    fill: var(--green);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }
  .node {
    cursor: pointer;
    transition: stroke-width 120ms ease, fill 120ms ease;
  }
  .node.dimmed { opacity: 0.18; }
  .node.selected { stroke-width: 2; }
  .edge {
    pointer-events: none;
    fill: none;
    transition: opacity 160ms ease;
  }
  .edge.dimmed { opacity: 0.03; }
  .edge.bright { opacity: 0.78; }

  .selection-card {
    margin-top: 18px;
    padding: 14px 16px;
    border: 1px solid var(--hair);
    border-radius: 8px;
    background: var(--paper);
    min-height: 70px;
  }
  .selection-card .empty {
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.5;
  }
  .selection-card h4 {
    margin: 0 0 6px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .selection-card .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 8px 0 10px;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 2px 7px;
    border: 1px solid var(--tag-border);
    border-radius: 4px;
    color: var(--ink);
    background: var(--paper);
  }
  .tag.acc { background: var(--green-fill); border-color: rgba(47,139,94,0.32); color: var(--green); }
  .tag.pos { background: rgba(200,65,62,0.10); border-color: rgba(200,65,62,0.32); color: var(--pos); }
  .tag.neg { background: rgba(30,95,190,0.10); border-color: rgba(30,95,190,0.32); color: var(--neg); }
  .strip {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 90px 1fr;
    column-gap: 12px;
    row-gap: 6px;
    font-size: 11.5px;
  }
  .strip .k { color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .strip .v { color: var(--ink); font-family: 'JetBrains Mono', monospace; }

  .token-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .token-bar .cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 7px;
    border-radius: 4px;
    border: 1px solid var(--tag-border);
    white-space: pre;
  }
  .legend {
    display: flex;
    gap: 18px;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 12px;
  }
  .legend .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -1px;
  }
  .legend .pos-sw { background: var(--pos); }
  .legend .neg-sw { background: var(--neg); }
  .legend .line {
    display: inline-block;
    width: 18px;
    height: 0;
    border-top: 2px solid var(--muted);
    vertical-align: middle;
    margin-right: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #F2F2F0;
      --muted: #9C9CA3;
      --hair: #25252A;
      --paper: #131318;
      --bg: #0B0B0E;
      --pill-bg: #1B1B22;
      --green: #58C28E;
      --green-fill: rgba(88, 194, 142, 0.18);
      --tag-border: #2A2A30;
      --pos: #E26764;
      --pos-soft: rgba(226, 103, 100, 0.55);
      --neg: #5E92E0;
      --neg-soft: rgba(94, 146, 224, 0.55);
      --row-line: #1F1F25;
    }
  }
</style>
</head>

<script>
(function () {
  const BUNDLE = JSON.parse(document.getElementById('data-bundle').textContent);

  const PROMPT_LABELS = {
    rust_pubuse:     'pub use crate::',
    py_dataclasses:  'from dataclasses import',
    ts_export:       'export const ',
    rust_impl_drop:  'impl Drop for ',
    py_django:       'class Profile(models.Model): user = models.',
    py_async_def:    'async def fetch(',
    rust_trait:      'trait Iterator { fn next(&mut self) -> ',
    ts_typeof:       'type ButtonProps = ',
  };

  const MATRIX_SHORT = {
    self_attn_q_proj: 'q',
    self_attn_k_proj: 'k',
    self_attn_v_proj: 'v',
    self_attn_o_proj: 'o',
    mlp_up_proj:      'up',
    mlp_down_proj:    'down',
  };

  const state = {
    promptIdx: 0,
    mode: 'base',
    edgesOn: true,
    selectedId: null,
  };

  const ROW_HEIGHT = 26;
  const LEFT_GUTTER = 96;
  const TOP_GUTTER = 56;
  const TOKEN_COL_WIDTH = 170;
  const CELL_PAD_X = 8;
  const CELL_PAD_Y = 3;
  const SLOT_W = 13;
  const SLOT_H = 10;
  const SLOTS_PER_ROW = 10;
  const DOT_BASE = 1.6;
  const DOT_MAX = 4.8;
  const TOKEN_GAP = 6;        // visual gap between token columns
  const EPS_PER_TOKEN = 1e-4; // threshold to show a component-circle in a cell

  function currentPrompt() { return BUNDLE.prompts[state.promptIdx]; }
  function currentData() { return currentPrompt()[state.mode]; }
  function nodeRowKey(n) { return `L${n.layer}__${n.matrix}`; }

  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
  function dotRadius(absAttr, maxAttr) {
    if (maxAttr <= 0) return DOT_BASE;
    const norm = clamp(absAttr / maxAttr, 0, 1);
    return DOT_BASE + Math.sqrt(norm) * (DOT_MAX - DOT_BASE);
  }

  function buildRowIndex(layers, matrices) {
    const idx = {};
    let r = 0;
    for (const layer of layers) {
      for (const matrix of matrices) {
        idx[`L${layer}__${matrix.replace(/\./g, '_')}`] = r;
        r += 1;
      }
    }
    return { idx, totalRows: r };
  }

  const INTRA = [
    ['self_attn_q_proj', 'self_attn_o_proj'],
    ['self_attn_k_proj', 'self_attn_o_proj'],
    ['self_attn_v_proj', 'self_attn_o_proj'],
    ['self_attn_o_proj', 'mlp_up_proj'],
    ['mlp_up_proj',      'mlp_down_proj'],
  ];

  // Per-token edges: connect a circle in row R at token t to circles in
  // the adjacent row R' at the same token t whose attribution at t has the
  // same sign and similar magnitude. Edge weight = sign(a)*sign(b)*sqrt(|a||b|)
  // on that single (row->row', t) pair. Top-K per source circle kept.
  function computePerTokenEdges(cellCircles, rowPairs, topK = 2) {
    const edges = [];
    function pair(srcRow, dstRow) {
      const T_max = Math.max(
        ...Object.keys(cellCircles)
                .filter(k => k.startsWith(srcRow + '|') || k.startsWith(dstRow + '|'))
                .map(k => parseInt(k.split('|')[1], 10)),
        -1
      );
      for (let t = 0; t <= T_max; t++) {
        const A = cellCircles[`${srcRow}|${t}`] || [];
        const B = cellCircles[`${dstRow}|${t}`] || [];
        for (const a of A) {
          const cand = [];
          for (const b of B) {
            const sgn = Math.sign(a.v) * Math.sign(b.v);
            const w = sgn * Math.sqrt(Math.abs(a.v) * Math.abs(b.v));
            if (Math.abs(w) > 1e-6) cand.push({ b, w });
          }
          cand.sort((x, y) => Math.abs(y.w) - Math.abs(x.w));
          for (let i = 0; i < Math.min(topK, cand.length); i++) {
            edges.push({ src: a, dst: cand[i].b, weight: cand[i].w });
          }
        }
      }
    }
    for (const [s, d] of rowPairs) pair(s, d);
    return edges;
  }

  function buildRowPairs(layers) {
    const pairs = [];
    for (const layer of layers) {
      for (const [s, d] of INTRA) {
        pairs.push([`L${layer}__${s}`, `L${layer}__${d}`]);
      }
    }
    for (let i = 0; i < layers.length - 1; i++) {
      const L1 = layers[i], L2 = layers[i + 1];
      for (const dst of ['self_attn_q_proj','self_attn_k_proj','self_attn_v_proj']) {
        pairs.push([`L${L1}__mlp_down_proj`, `L${L2}__${dst}`]);
      }
    }
    return pairs;
  }

  const svg = document.getElementById('graph');
  const NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function formatTok(tok) {
    let s = tok.replace(/\n/g, '↵').replace(/\t/g, '⇥');
    if (s.length > 14) s = s.slice(0, 13) + '…';
    return JSON.stringify(s).slice(1, -1);
  }

  function bezierPath(x1, y1, x2, y2) {
    const dx = Math.abs(x2 - x1);
    const dy = y2 - y1;
    const horizontal = Math.abs(dy) < 1;
    const c = horizontal ? 30 : 40 + dx * 0.25;
    return `M ${x1} ${y1} C ${x1 + c * 0.4} ${y1}, ${x2 - c * 0.4} ${y2}, ${x2} ${y2}`;
  }

  function render() {
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const data = currentData();
    const layers = data.layers;
    const matrices = data.matrices.map(m => m.replace(/\./g, '_'));
    const T = data.tokens.length;
    const targetPos = data.target_pos;

    // First pass: figure out which (layer, matrix) rows have ANY circle to
    // render, then assign compacted row indices to those only.
    const nodes = data.nodes;
    const rowHasContent = {};   // rowKey -> bool
    for (const n of nodes) {
      for (const v of n.attribution_per_token) {
        if (Math.abs(v) >= EPS_PER_TOKEN) {
          rowHasContent[nodeRowKey(n)] = true; break;
        }
      }
    }

    // Build compacted rowIdx in canonical order (layer, then matrix).
    const rowIdx = {};
    const renderedRows = [];   // [{layer, matrix, rowKey, idx}]
    let r = 0;
    for (const layer of layers) {
      for (const matrix of matrices) {
        const k = `L${layer}__${matrix}`;
        if (!rowHasContent[k]) continue;
        rowIdx[k] = r;
        renderedRows.push({ layer, matrix, rowKey: k, idx: r });
        r += 1;
      }
    }
    const totalRows = r;

    const cellsW = TOKEN_COL_WIDTH * T;
    const width = LEFT_GUTTER + cellsW + 60;
    const height = TOP_GUTTER + totalRows * ROW_HEIGHT + 30;
    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

    // Draw alternating column bands (very faint) for token columns + a
    // soft accent on the target-position column.
    for (let t = 0; t < T; t++) {
      const xL = LEFT_GUTTER + t * TOKEN_COL_WIDTH;
      const band = svgEl('rect', {
        x: xL, y: TOP_GUTTER - 28,
        width: TOKEN_COL_WIDTH,
        height: totalRows * ROW_HEIGHT + 38,
        fill: t === targetPos ? 'var(--green-fill)'
                               : (t % 2 === 0 ? 'rgba(0,0,0,0.018)' : 'transparent'),
      });
      svg.appendChild(band);
    }
    for (let t = 0; t < T; t++) {
      const cx = LEFT_GUTTER + (t + 0.5) * TOKEN_COL_WIDTH;
      const tok = data.tokens[t];
      const txt = svgEl('text', {
        x: cx, y: TOP_GUTTER - 22,
        class: t === targetPos ? 'target-label' : 'token-label',
        'text-anchor': 'middle',
      });
      txt.textContent = formatTok(tok);
      svg.appendChild(txt);
      if (t === targetPos) {
        const arrow = svgEl('text', {
          x: cx, y: TOP_GUTTER - 7,
          class: 'target-label', 'text-anchor': 'middle',
        });
        arrow.textContent = '↓ predict next';
        svg.appendChild(arrow);
      }
    }

    // Group rendered rows by layer for the bracket-style layer label
    const rowsByLayer = {};
    for (const rr of renderedRows) {
      if (!rowsByLayer[rr.layer]) rowsByLayer[rr.layer] = [];
      rowsByLayer[rr.layer].push(rr);
    }
    let prevLayer = null;
    for (const layer of Object.keys(rowsByLayer).map(Number).sort((a, b) => a - b)) {
      const lrows = rowsByLayer[layer];
      const first = lrows[0].idx, last = lrows[lrows.length - 1].idx;
      const topY = TOP_GUTTER + first * ROW_HEIGHT;
      const botY = TOP_GUTTER + (last + 1) * ROW_HEIGHT;
      // layer divider above the first row of each layer (except top-most)
      if (prevLayer !== null) {
        const sep = svgEl('line', {
          x1: LEFT_GUTTER - 6, x2: width - 8,
          y1: topY, y2: topY, class: 'layer-divider',
        });
        svg.appendChild(sep);
      }
      // layer label, vertically centered on the rendered block
      const ll = svgEl('text', {
        x: 12, y: (topY + botY) / 2 + 4,
        class: 'layer-label', 'text-anchor': 'start',
      });
      ll.textContent = `L${String(layer).padStart(2,'0')}`;
      svg.appendChild(ll);
      // per-row matrix sublabels
      for (const rr of lrows) {
        const ry2 = TOP_GUTTER + rr.idx * ROW_HEIGHT;
        const ml = svgEl('text', {
          x: LEFT_GUTTER - 10, y: ry2 + ROW_HEIGHT * 0.62,
          class: 'row-label', 'text-anchor': 'end',
        });
        ml.textContent = MATRIX_SHORT[rr.matrix] || rr.matrix;
        svg.appendChild(ml);
      }
      prevLayer = layer;
    }

    // ---------------------------------------------------------------
    // Per-cell circle clusters: each (layer-row, token) cell collects
    // every component whose |attribution at that token| > eps, packed
    // into a small grid in the cell.
    let maxPerToken = 0;
    for (const n of nodes) {
      for (const v of n.attribution_per_token) {
        if (Math.abs(v) > maxPerToken) maxPerToken = Math.abs(v);
      }
    }

    const cellCircles = {};   // "rowKey|t" -> [{node, v, x, y, r, sign}]
    const circleById = {};    // "node.id@t" -> circle object

    for (const n of nodes) {
      const ri = rowIdx[nodeRowKey(n)];
      if (ri === undefined) continue;
      for (let t = 0; t < n.attribution_per_token.length; t++) {
        const v = n.attribution_per_token[t];
        if (Math.abs(v) < EPS_PER_TOKEN) continue;
        const key = `${nodeRowKey(n)}|${t}`;
        if (!cellCircles[key]) cellCircles[key] = [];
        cellCircles[key].push({ node: n, v, t, ri });
      }
    }
    // Sort each cell by |v| desc and assign slot positions.
    for (const key in cellCircles) {
      const arr = cellCircles[key];
      arr.sort((a, b) => Math.abs(b.v) - Math.abs(a.v));
      const [rowKey, tStr] = key.split('|');
      const t = parseInt(tStr, 10);
      const ri = arr[0].ri;
      const cellLeft = LEFT_GUTTER + t * TOKEN_COL_WIDTH + CELL_PAD_X + TOKEN_GAP / 2;
      const cellTop  = TOP_GUTTER + ri * ROW_HEIGHT + CELL_PAD_Y;
      const maxCols = Math.min(SLOTS_PER_ROW, Math.floor((TOKEN_COL_WIDTH - 2*CELL_PAD_X - TOKEN_GAP) / SLOT_W));
      for (let i = 0; i < arr.length; i++) {
        const row = Math.floor(i / maxCols);
        const col = i % maxCols;
        arr[i].x = cellLeft + (col + 0.5) * SLOT_W;
        arr[i].y = cellTop  + (row + 0.5) * SLOT_H;
        arr[i].r = dotRadius(Math.abs(arr[i].v), maxPerToken);
        circleById[`${arr[i].node.id}@${t}`] = arr[i];
      }
    }

    // Edges chain through every consecutive rendered row (regardless of which
    // matrix), so the graph stays connected even when q/k/o/up rows are dead.
    const rowPairs = [];
    for (let i = 0; i + 1 < renderedRows.length; i++) {
      rowPairs.push([renderedRows[i].rowKey, renderedRows[i + 1].rowKey]);
    }
    const edges = state.edgesOn
      ? computePerTokenEdges(cellCircles, rowPairs, 3)
      : [];

    // edges first (below nodes)
    const edgeGroup = svgEl('g', { id: 'edges' });
    svg.appendChild(edgeGroup);
    for (const e of edges) {
      const a = e.src, b = e.dst;
      const path = bezierPath(a.x, a.y, b.x, b.y);
      const color = e.weight >= 0 ? 'var(--pos)' : 'var(--neg)';
      const normW = Math.abs(e.weight) / Math.max(maxPerToken, 1e-6);
      const sw = clamp(0.7 + Math.sqrt(normW) * 1.8, 0.7, 2.4);
      const op = clamp(0.28 + normW * 0.55, 0.28, 0.80);
      const srcCompId = `${a.node.id}@${a.t}`;
      const dstCompId = `${b.node.id}@${b.t}`;
      // tagging by full component path so hover-on-component highlights all edges that involve THAT component (any token).
      const el = svgEl('path', {
        d: path, stroke: color, 'stroke-width': sw,
        opacity: op, class: 'edge',
        'data-src': srcCompId, 'data-dst': dstCompId,
        'data-src-comp': a.node.id, 'data-dst-comp': b.node.id,
      });
      edgeGroup.appendChild(el);
    }

    // nodes on top
    const nodeGroup = svgEl('g', { id: 'nodes' });
    svg.appendChild(nodeGroup);
    for (const key in cellCircles) {
      for (const c of cellCircles[key]) {
        const color = c.v >= 0 ? 'var(--pos)' : 'var(--neg)';
        const fillOp = clamp(Math.abs(c.v) / Math.max(maxPerToken, 1e-6), 0.18, 0.92);
        const el = svgEl('circle', {
          cx: c.x, cy: c.y, r: c.r,
          fill: color, 'fill-opacity': fillOp,
          stroke: color, 'stroke-width': 0.7,
          class: 'node',
          'data-id': `${c.node.id}@${c.t}`,
          'data-comp': c.node.id,
        });
        el.addEventListener('mouseenter', () => focusComp(c.node.id, true));
        el.addEventListener('mouseleave', () => {
          if (!state.selectedId) clearFocus();
          else focusComp(state.selectedId, false);
        });
        el.addEventListener('click', (ev) => {
          ev.stopPropagation();
          state.selectedId = (state.selectedId === c.node.id) ? null : c.node.id;
          if (state.selectedId) focusComp(state.selectedId, false);
          else clearFocus();
          showCard(state.selectedId);
        });
        nodeGroup.appendChild(el);
      }
    }

    svg.addEventListener('click', () => {
      state.selectedId = null; clearFocus(); showCard(null);
    });

    const pred = data.predicted_top[0];
    document.getElementById('pred-tok').textContent = formatTok(pred.token);
    document.getElementById('pred-prob').textContent = `(p = ${pred.prob.toFixed(3)})`;
    document.getElementById('pred-list').textContent = data.predicted_top
      .map(t => `${formatTok(t.token)}·${(t.prob*100).toFixed(1)}%`)
      .join('  ');

    showCard(state.selectedId);
  }

  function focusComp(compId, soft) {
    // compId is the underlying node-id (e.g. "L12__self_attn_k_proj:5").
    // Bright = every circle of this component across all tokens + every
    // edge that touches the component on either end.
    const incidentComps = new Set([compId]);
    svg.querySelectorAll('.edge').forEach(e => {
      const sc = e.getAttribute('data-src-comp');
      const dc = e.getAttribute('data-dst-comp');
      if (sc === compId || dc === compId) {
        e.classList.remove('dimmed');
        e.classList.add('bright');
        incidentComps.add(sc); incidentComps.add(dc);
      } else {
        e.classList.add('dimmed');
        e.classList.remove('bright');
      }
    });
    svg.querySelectorAll('.node').forEach(n => {
      const c = n.getAttribute('data-comp');
      if (incidentComps.has(c)) {
        n.classList.remove('dimmed');
        if (c === compId) n.classList.add('selected');
        else n.classList.remove('selected');
      } else {
        n.classList.add('dimmed');
        n.classList.remove('selected');
      }
    });
    if (!soft) showCard(compId);
  }

  function clearFocus() {
    svg.querySelectorAll('.edge').forEach(e => {
      e.classList.remove('dimmed'); e.classList.remove('bright');
    });
    svg.querySelectorAll('.node').forEach(n => {
      n.classList.remove('dimmed'); n.classList.remove('selected');
    });
  }

  function el(tag, opts) {
    const e = document.createElement(tag);
    if (opts && opts.class) e.className = opts.class;
    if (opts && opts.text !== undefined) e.textContent = opts.text;
    if (opts && opts.style) e.setAttribute('style', opts.style);
    return e;
  }

  function showCard(id) {
    const card = document.getElementById('card');
    card.replaceChildren();
    if (!id) {
      const p = el('div', {
        class: 'empty',
        text: 'Hover or click a circle to inspect a component. Circle size encodes total |attribution| on this prompt. Edges connect components that co-activate on the same tokens.',
      });
      card.appendChild(p);
      return;
    }
    const data = currentData();
    const n = data.nodes.find(x => x.id === id);
    if (!n) return;
    const sign = n.total_attribution >= 0 ? 'pos' : 'neg';
    const signLabel = n.total_attribution >= 0 ? 'raises target' : 'suppresses target';

    const niceMatrix = n.matrix
      .replace(/_proj$/, '')
      .replace(/^self_attn_/, 'attn-')
      .replace(/^mlp_/, 'mlp-');
    const h = el('h4', { text: `${niceMatrix} · component #${n.component}` });
    card.appendChild(h);

    const tags = el('div', { class: 'tags' });
    const tagPairs = [
      ['tag', `layer ${String(n.layer).padStart(2, '0')}`],
      ['tag', n.matrix],
      ['tag', `comp ${n.component}`],
      [`tag ${sign}`, `${n.total_attribution.toFixed(3)} · ${signLabel}`],
      ['tag acc', `mean gate ${n.mean_gate.toFixed(2)}`],
    ];
    for (const [cls, txt] of tagPairs) {
      tags.appendChild(el('span', { class: cls, text: txt }));
    }
    card.appendChild(tags);

    let maxAbs = 0;
    let peakIdx = 0, peakAbs = -1;
    n.attribution_per_token.forEach((v, i) => {
      const a = Math.abs(v);
      if (a > maxAbs) maxAbs = a;
      if (a > peakAbs) { peakAbs = a; peakIdx = i; }
    });

    const strip = el('div', { class: 'strip' });
    strip.appendChild(el('div', { class: 'k', text: 'peak token' }));
    strip.appendChild(el('div', {
      class: 'v',
      text: maxAbs > 0 ? `[${peakIdx}] ${formatTok(data.tokens[peakIdx])}` : '–',
    }));
    strip.appendChild(el('div', { class: 'k', text: 'total |attr|' }));
    strip.appendChild(el('div', { class: 'v', text: maxAbs.toFixed(4) }));
    card.appendChild(strip);

    const bar = el('div', { class: 'token-bar' });
    n.attribution_per_token.forEach((v, t) => {
      const norm = maxAbs > 0 ? Math.abs(v) / maxAbs : 0;
      const col = v >= 0
        ? `rgba(200,65,62,${0.10 + norm * 0.65})`
        : `rgba(30,95,190,${0.10 + norm * 0.65})`;
      const c = el('span', {
        class: 'cell',
        text: formatTok(data.tokens[t]),
        style: `background:${col}`,
      });
      bar.appendChild(c);
    });
    card.appendChild(bar);
  }

  function bindToolbar() {
    const sel = document.getElementById('prompt-select');
    const promptLabel = document.getElementById('prompt-label');
    BUNDLE.prompts.forEach((p, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = PROMPT_LABELS[p.id] || p.id;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => {
      state.promptIdx = parseInt(sel.value, 10);
      state.selectedId = null;
      promptLabel.textContent = PROMPT_LABELS[BUNDLE.prompts[state.promptIdx].id] || '·';
      render();
    });
    document.querySelectorAll('#mode-toggle button').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#mode-toggle button').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        state.mode = b.dataset.mode;
        state.selectedId = null;
        render();
      });
    });
    document.querySelectorAll('#edge-toggle button').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#edge-toggle button').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        state.edgesOn = b.dataset.edges === 'on';
        render();
      });
    });
    promptLabel.textContent = PROMPT_LABELS[BUNDLE.prompts[0].id] || '·';
  }

  bindToolbar();
  render();
})();
</script>
</body>
</html>
